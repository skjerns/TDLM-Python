# This workflow uploads a Python Package to PyPI when a release is created.
# Authentication uses PyPI Trusted Publishing (OIDC) — configure the publisher
# on PyPI: project tdlm-python, owner skjerns, repo TDLM-Python,
# workflow build_package_pypi.yml, environment pypi.
# See: https://docs.pypi.org/trusted-publishers/

name: Upload Python Package to PyPI

on:
  workflow_dispatch:
  release:
    types: [created]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install build/test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build flake8 pytest scipy numpy
          pip install -e .
      - name: Test with pytest
        run: pytest -s -vv
      - name: Build sdist and wheel
        run: python -m build
      - name: Upload built distributions
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - name: Download built distributions
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
